<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 03 - Conversion de Temperaturas</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"

</head>

<body class="bg-light">

        <div class="row justify-content-center">

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h2 class="h5 mb-0">Conversor de Temperatura</h2>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label fw-bold small text-secondary">Grados Celsius (°C)</label>
                                <input type="number" id="inputCelsius" class="form-control" placeholder="Ej: 25">
                            </div>
                            <div class="col-md-4">
                                <button id="btnConvertir" class="btn btn-primary w-100 fw-bold">Convertir</button>
                            </div>
                        </div>

                        <div id="resultadoTemp" class="mt-4 p-3 border-0 rounded bg-light d-none text-center">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="mt-4 text-center border-top pt-3">
