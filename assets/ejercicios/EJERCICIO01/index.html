<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h2 class="h5 mb-0" id="tituloCard">Gestión de Alumnos</h2>
                    </div>

                    <div class="card-body">
                        <div class="btn-group w-100 mb-4 shadow-sm">
                            <button id="tabAlumno" class="btn btn-outline-primary active">Alumno</button>
                            <button id="tabBanda" class="btn btn-outline-primary">Banda</button>
                            <button id="tabPerro" class="btn btn-outline-primary">Perro</button>
                        </div>

                        <div id="contenedorFormularios" class="mb-4">
                            <div id="formAlumno" class="row g-2">
                                <div class="col-8">
                                    <input type="text" id="inputNombreAlumno" class="form-control"
                                        placeholder="Nombre Alumno">
                                </div>
                                <div class="col-4">
                                    <input type="number" id="inputEdadAlumno" class="form-control" placeholder="Edad">
                                </div>
                                <div class="col-12 mt-2">
                                    <input type="text" id="inputCarreraAlumno" class="form-control"
                                        placeholder="Carrera">
                                </div>
                                <div class="row g-2">
                                    <div class="col-12 mt-3 text-center">
                                        <button id="btnGuardarAlumno" class="btn btn-primary px-4">Registrar
                                            Alumno</button>
                                    </div>
                                </div>
                            </div>

                            <div id="formBanda" class="row g-3 d-none">
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Nombre de la Banda</label>
                                    <input type="text" id="inputNombreBanda" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Género Musical</label>
                                    <input type="text" id="inputGeneroBanda" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Álbumes</label>
                                    <textarea id="inputAlbumBanda" class="form-control" rows="2"
                                        placeholder="Ej: Abbey Road, Let It Be"></textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Integrantes</label>
                                    <textarea id="inputIntegrantesBanda" class="form-control" rows="2"
                                        placeholder="Ej: John, Paul, George, Ringo"></textarea>
                                </div>
                                <div class="row g-3">
                                    <div class="col-12 mt-3 text-center">
                                        <button id="btnGuardarBanda" class="btn btn-success px-4">Guardar Banda</button>
                                    </div>
                                </div>
                            </div>

                            <div id="formPerro" class="row g-2 d-none">
                                <div class="col-6">
                                    <input type="text" id="inputPerro" class="form-control" placeholder="Nombre Perro">
                                </div>
                                <div class="col-6">
                                    <input type="text" id="inputRazaPerro" class="form-control" placeholder="Raza">
                                </div>
                                <div class="col-4">
                                    <input type="number" id="inputEdadPerro" class="form-control" placeholder="Edad">
                                </div>
                                <div class="col-8">
                                    <input type="text" id="inputColorPerro" class="form-control" placeholder="Color">
                                </div>
                                <div class="row g-2">
                                    <div class="col-12 mt-3 text-center">
                                        <button id="btnGuardarPerro" class="btn btn-warning px-4">Registrar
                                            Mascota</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-center">
                            <!-- <button type="submit" id="btnIniciar" class="btn btn-success px-5">Iniciar</button> -->
                            <a href="../../../index.html" class="btn btn-light">Volver</a>
                        </div>

                        <div id="resultado" class="mt-4 p-3 border rounded bg-white d-none shadow-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
</body>

</html>
