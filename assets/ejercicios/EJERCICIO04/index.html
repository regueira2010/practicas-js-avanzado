<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 04 - Manipulación del DOM</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container-fluid mt-5 px-4">
        <div class="row g-4">
            <div class="col-lg-3 col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-success text-white py-3">
                        <h2 class="h5 mb-0 text-center">Repetidor</h2>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-bold">Palabra:</label>
                                <input type="text" id="palabraRepetir" class="form-control" placeholder="Ej: Hola">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">¿Cuántas veces?</label>
                                <input type="number" id="cantidadRepetir" class="form-control" placeholder="Ej: 8"
                                    min="1">
                            </div>
                            <div class="col-12 mt-3">
                                <button id="btnEjecutar"
                                    class="btn btn-success w-100 fw-bold text-uppercase">¡Repetir!</button>
                            </div>
                        </div>
                        <div id="resultadoRepeticion" class="mt-4 p-3 border rounded bg-light text-center fs-6 d-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white py-3 text-center">
                        <h2 class="h5 mb-0">Fondo Dinámico</h2>
                    </div>
                    <div class="card-body p-4 text-center">
                        <label for="colorPicker" class="fw-bold small d-block mb-2">Elija un color:</label>
                        <input type="color" id="colorPicker" class="form-control form-control-color w-100 mb-3"
                            value="#ffffff">
                        <button id="btnAplicarColor" class="btn btn-outline-dark w-100 fw-bold mb-3">APLICAR!</button>
                        <div id="textoParaColorear" class="p-2 border rounded small" style="font-size: 0.8rem;">
                            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h2 class="h5 mb-0">Calculadora</h2>
                    </div>
                    <div class="card-body p-4">
                        <input type="number" id="num1" class="form-control mb-2" placeholder="Num 1">
                        <input type="number" id="num2" class="form-control mb-2" placeholder="Num 2">
                        <button id="btnCalcular" class="btn btn-primary w-100 fw-bold">CALCULAR!</button>
                        <div id="areaCalculos" class="mt-3 p-2 border rounded bg-light d-none small">
                            <div id="listaOperaciones" class="font-monospace"></div>
                            <div id="sumaTotal" class="fw-bold text-primary mt-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-warning text-dark text-center py-3">
                        <h2 class="h5 mb-0 fw-bold">Inversor</h2>
                    </div>
                    <div class="card-body p-4">
                        <label class="form-label small fw-bold">Texto:</label>
                        <input type="text" id="inputCadena" class="form-control mb-3" placeholder="Ej: Hola Mundo">
                        <button id="btnInvertir" class="btn btn-warning w-100 fw-bold">INVERTIR!</button>
                        <div id="resultadoInversion" class="mt-3 p-2 border rounded bg-light d-none text-center">
                            <h6 id="textoInvertido" class="mb-0 font-monospace" style="word-break: break-all;"></h6>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="assets/js/app.js"></script>
</body>

</html>
